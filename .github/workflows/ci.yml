name: Spotify dbt CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  sqlfluff-lint:
    name: Lint SQL (SQLFluff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SQLFluff
        run: pip install sqlfluff sqlfluff-templater-dbt

      - name: Run SQLFluff lint
        run: |
          sqlfluff lint spotify_dbt/models/ \
            --dialect postgres \
            --templater dbt \
            --exclude-rules L031
        env:
          DBT_HOST: ${{ secrets.DBT_HOST }}
          DBT_USER: ${{ secrets.DBT_USER }}
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
          DBT_DBNAME: ${{ secrets.DBT_DBNAME }}

  dbt-tests:
    name: Run dbt Tests
    runs-on: ubuntu-latest
    needs: sqlfluff-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-postgres
        run: pip install dbt-postgres

      - name: Copy profiles.yml
        run: |
          mkdir -p ~/.dbt
          cp spotify_dbt/profiles.yml ~/.dbt/profiles.yml

      - name: Install dbt packages
        working-directory: spotify_dbt
        run: dbt deps

      - name: Run dbt models
        working-directory: spotify_dbt
        run: dbt run --target dev
        env:
          DBT_HOST: ${{ secrets.DBT_HOST }}
          DBT_USER: ${{ secrets.DBT_USER }}
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
          DBT_DBNAME: ${{ secrets.DBT_DBNAME }}

      - name: Run dbt tests
        working-directory: spotify_dbt
        run: dbt test --target dev
        env:
          DBT_HOST: ${{ secrets.DBT_HOST }}
          DBT_USER: ${{ secrets.DBT_USER }}
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
          DBT_DBNAME: ${{ secrets.DBT_DBNAME }}

      - name: Generate dbt docs
        working-directory: spotify_dbt
        run: dbt docs generate --target dev
        env:
          DBT_HOST: ${{ secrets.DBT_HOST }}
          DBT_USER: ${{ secrets.DBT_USER }}
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
          DBT_DBNAME: ${{ secrets.DBT_DBNAME }}

      - name: Upload dbt docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: spotify_dbt/target/